name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "--cfg reqwest_unstable"

jobs:
  check:
    name: Check, Lint, Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Format check
        run: find webclaw-http/src webclaw-http/tests bench/src -name '*.rs' | xargs rustfmt --check

      - name: Clippy
        run: cargo clippy -p webclaw-http --manifest-path webclaw-http/Cargo.toml -- -D warnings

      - name: Unit tests
        run: cargo test --manifest-path webclaw-http/Cargo.toml --lib

      - name: Hermetic tests
        run: cargo test --manifest-path webclaw-http/Cargo.toml --test unit

  integration:
    name: Integration Tests (network)
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Fingerprint tests
        run: cargo test --manifest-path webclaw-http/Cargo.toml --test fingerprint

      - name: HTTP method tests
        run: cargo test --manifest-path webclaw-http/Cargo.toml --test http_methods

  sync-downstream:
    name: Sync to webclaw core
    runs-on: ubuntu-latest
    needs: [check]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Trigger core dependency update
        run: |
          gh api repos/0xMassi/webclaw/dispatches \
            -f event_type=tls-updated \
            -f client_payload[sha]=${{ github.sha }}
        env:
          GH_TOKEN: ${{ secrets.SYNC_PAT }}
